<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https: localhost:*; script-src 'unsafe-inline' 'unsafe-eval' https: localhost:*; connect-src https: localhost:* ws://localhost:*; style-src 'unsafe-inline' https:; object-src 'none';"
    />
    <meta name="importmap-type" content="systemjs-importmap" />
    <meta name="import-map-overrides-domains" content="denylist:prod.example.com" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE-PICE Coming Soon</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">


    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/single-spa@5.9.0/lib/system/single-spa.min.js"
      as="script"
    />

    <script src="https://cdn.jsdelivr.net/npm/systemjs@6.11.0/dist/extras/dynamic-import-maps.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/systemjs@6.8.3/dist/system.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/systemjs@6.8.3/dist/extras/amd.min.js"></script>
    

    <script id="map" type="systemjs-importmap">
      {
        "imports": {
          "single-spa": "https://cdn.jsdelivr.net/npm/single-spa@5.9.3/lib/system/single-spa.min.js",
          "vue": "https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js",
          "vue-router": "https://unpkg.com/vue-router@3/dist/vue-router.js",
          "vue-next": "https://unpkg.com/vue@3/dist/vue.global.js",
          "mfe": "https://d1wub6s1ympoc5.cloudfront.net/mfe/one-pice/js/main.js"
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/import-map-overrides@2.2.0/dist/import-map-overrides.js"></script>

    <script type="module">
      const module = System.import('mfe').then((app) => {
        app.mount('#app')
      })
    </script>
    
  </head>
  <body>
    <div id="app"></div>
    <import-map-overrides-full
      show-when-local-storage="devtools"
      dev-libs
    ></import-map-overrides-full>
  </body>
</html>
