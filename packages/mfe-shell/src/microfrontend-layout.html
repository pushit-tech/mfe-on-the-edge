<single-spa-router >

  <nav>
    <div>
      <a href="/shell" onclick="singleSpaNavigate(event);">Marvel</a> | <a href="/shell/one-pice" onclick="singleSpaNavigate(event);">One Pice</a>
    </div>
  </nav>

  <main>
    <route path="shell">
      <route path="one-pice">
        <application name="@mfe/one-pice" props="baseUrl"></application>
      </route>
      <route default>
        <application name="@mfe/marvel" props="baseUrl"></application>
      </route>
    </route>
  </main>
</single-spa-router>
