<single-spa-router>
  <nav class="bg-gray-800 text-white p-4">
    <a href="/shell" onclick="singleSpaNavigate(event);" class="text-blue-500 hover:underline focus:underline focus:outline-none">Marvel</a>
    <span class="mx-2 text-gray-400">|</span>
    <a href="/shell/one-pice" onclick="singleSpaNavigate(event);" class="text-yellow-500 hover:underline focus:underline focus:outline-none">One Piece</a>
</nav>

  <main>
    <route path="shell">
      <route path="one-pice">
        <application name="@mfe/one-pice" props="baseUrl"></application>
      </route>
      <route default>
        <application name="@mfe/marvel" props="baseUrl"></application>
      </route>
    </route>
  </main>
</single-spa-router>
