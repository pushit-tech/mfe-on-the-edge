name: Reusable workflow for mfe single page apps
run-name: mfe workflow template

on:
  workflow_call:
    inputs:
      mfe_name:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: '18'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            mfe: 
              - 'packages/mfe-${{ inputs.mfe_name }}/**' 

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{inputs.node_version}}

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v2
        with:
          name: dist
          path: dist/

      - name: Setup AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Uploading Static pages to S3
        run: |
          aws s3 sync ./packages/mfe-${{inputs.mfe_name}} s3://$S3_BUCKET_NAME/mfe/${{inputs.mfe_name}} --delete