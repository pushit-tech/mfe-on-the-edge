name: Updating lambda edge function

on:
  push:
    paths:
      - packages/routing-edge/**
    paths-ignore:
      - packages/routing-edge/src/routes/frontend-catalog.json
    branches:
      - main  
  pull_request:
    paths: 
      - packages/routing-edge/**
    paths-ignore:
      - packages/routing-edge/src/routes/frontend-catalog.json  

jobs:
  build-deploy-sam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: aws-actions/setup-sam@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: cd ./packages/routing-edge
      - run: sam build --use-container
      - run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --stack-name mfe-on-the-edge --capabilities CAPABILITY_IAM --region us-east-1
